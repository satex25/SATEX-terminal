name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Skip duplicate runs when a PR is opened on the same head SHA as a push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: Gates (typecheck, lint, knip, tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The npm package lives in a nested workspace. Set defaults.run.working-directory
    # once so every shell step lands in the satex-app dir without per-step cd boilerplate.
    defaults:
      run:
        working-directory: apps/satex-terminal
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm
          cache-dependency-path: apps/satex-terminal/package-lock.json

      # npm ci respects the lockfile and refuses to mutate it — what we want in CI.
      # postinstall runs `electron-builder install-app-deps` which rebuilds better-sqlite3
      # against the Electron Node ABI. Linux runner has the build toolchain prebuilt.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck (main + renderer)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Dead-code audit (knip)
        run: npm run knip

      - name: Vitest unit suite
        run: npm test
